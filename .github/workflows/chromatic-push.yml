name: Chromatic Push

on:
  push:
    # We need these branches to update their baselines when they are merged into
    branches:
      - master
      - "[0-9]+.x"
      - "[0-9]+.x.x"
      - "[0-9]+.[0-9]+.x"
      - "major/**"
    paths:
      - ".storybook/**"
      - ".assets/**"
      - "logo/**"
      - "docs/*.mdx"
      - "docs/*.stories.tsx"
      - "src/**/*.mdx"
      - "src/**/*.stories.js"
      - "src/**/*.stories.jsx"
      - "src/**/*.stories.ts"
      - "src/**/*.stories.tsx"
      - "src/**"
      - "src/style/assets/**"
      - "package.json"
      - "package-lock.json"
      - "babel.config.js"
      - "tsconfig.json"
      - "tsconfig-build.json"

jobs:
  chromatic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: ">=24.11.0 24"
      - name: Update npm to 11.11.1
        run: npm install -g npm@11.11.1
      - run: npm ci
      - uses: chromaui/action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          onlyChanged: true
          exitOnceUploaded: true # We don't want it to fail CI, we'll be using the GitHub Check
