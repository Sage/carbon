name: Chromatic Push

on:
  push:
    # We need these branches to update their baselines when they are merged into
    branches:
      - master
      - "[0-9]+.x"
      - "[0-9]+.x.x"
      - "[0-9]+.[0-9]+.x"
      - "major/**"

jobs:
  chromatic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: ">=24.11.0 24"
          check-latest: true
      - name: Update npm to 11.18.0
        run: npm install -g npm@11.18.0
      - run: npm ci
      - name: Run chromatic
        run: npx chromatic --project-token ${{ secrets.CHROMATIC_PROJECT_TOKEN }} --only-changed --exit-once-uploaded
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
